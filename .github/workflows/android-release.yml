name: Android Release APK

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build spots database
        run: npm run scrape && npm run copy-db

      - name: Generate Android native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK with Gradle (test app, no keystore)
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK artifact
        id: apk
        run: |
          VERSION=$(node -p "require('./apps/mobile/package.json').version")
          APK_NAME="surf-pays-basque-test-v${VERSION}-build${{ github.run_number }}.apk"
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-test-apk
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev/build-${{ github.run_number }}
          name: Test APK build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.apk.outputs.apk_name }}
