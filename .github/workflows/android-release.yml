name: Android Release APK

on:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build spots database
        run: npm run scrape && npm run copy-db

      - name: Create mobile env file
        working-directory: apps/mobile
        run: |
          cat > .env <<EOF
          EXPO_PUBLIC_SHOM_API_KEY=${{ secrets.EXPO_PUBLIC_SHOM_API_KEY }}
          EOF

      - name: Generate Android native project
        working-directory: apps/mobile
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          EXPO_PUBLIC_SHOM_API_KEY: ${{ secrets.EXPO_PUBLIC_SHOM_API_KEY }}
        run: npx expo prebuild --platform android --no-install

      - name: Configure release signing
        working-directory: apps/mobile
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash scripts/configure-release-signing.sh android

      - name: Build release APK with Gradle
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare APK artifact
        id: apk
        run: |
          VERSION=$(node -p "require('./apps/mobile/package.json').version")
          APK_NAME="surf-pays-basque-dev-v${VERSION}-build${{ github.run_number }}.apk"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: ${{ steps.apk.outputs.apk_name }}
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev/build-${{ github.run_number }}
          name: Dev APK build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.apk.outputs.apk_name }}
